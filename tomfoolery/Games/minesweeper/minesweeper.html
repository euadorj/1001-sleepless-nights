<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Minesweeper · Microsoft Style</title>
    <link rel="stylesheet" href="minesweeper.css">
</head>
<body>
<div class="ms-container">
    <!-- Difficulty Controls -->
    <div class="difficulty-controls">
        <label for="gridSize">Grid Size (e.g., 9 for 9x9):</label>
        <input type="number" id="gridSize" value="9" min="5" max="20">
        
        <label for="numBombs">Number of Bombs:</label>
        <input type="number" id="numBombs" value="10" min="1" max="50">
        
        <button id="startGame">Start Game</button>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span class="mine-counter" id="mineDisplay">000</span>
        <div class="smiley" id="resetButton" role="button">😊</div>
        <span class="timer" id="timerDisplay">000</span>
    </div>
    
    <!-- Minesweeper Grid -->
    <div id="gridContainer" class="grid"></div>

    <!-- Leaderboard -->
    <div class="leaderboard" id="leaderboardContainer">
        <h3>Leaderboard</h3>
        <ul id="leaderboard"></ul>
    </div>
</div>
<script src="minesweeper.js"></script>
</body>
</html>
