<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    
    <title>Mock Interview App</title>
</head>
<body>
    <div class="container">
        <h1>Mock Interview Simulator</h1>
        <div id="questionBlock" class="question-block">
            <p id="question">Click "Get Question" to start.</p>
        </div>
        <button id="getQuestionButton">Get Question</button>
        <div>
            <textarea id="answer" rows="5" cols="50" placeholder="Your answer here..."></textarea>
        </div>
        <button id="startRecordButton">Start Recording Answer</button>
        <button id="stopRecordButton" style="display:none;">Stop Recording</button>
        <button id="playbackButton">Playback Answer</button>
        <button id="submitButton">Submit Answer</button>
        <div id="feedback" class="feedback"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
